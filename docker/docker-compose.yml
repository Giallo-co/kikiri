services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: social-media
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: